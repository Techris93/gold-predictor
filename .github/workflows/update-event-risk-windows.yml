name: Update Event Risk Windows

on:
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install updater dependency
        run: python -m pip install --upgrade requests

      - name: Refresh event windows
        run: python scripts/update_event_risk_windows.py --output config/event_risk_windows.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/event_risk_windows.json
          git diff --cached --quiet && exit 0
          git commit -m "Update event risk windows"
          git push
